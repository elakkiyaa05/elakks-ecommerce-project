<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Page</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f2f2f2;
    }

    .login-container{
      width:350px;
      background:white;
      padding:40px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      margin-bottom:25px;
      color:#333;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:15px;
    }

    .password-box{
      position:relative;
      width:100%;
    }

    .password-box input{
      padding-right:40px;
    }

    .toggle-eye{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      font-size:18px;
      user-select:none;
      color:#555;
    }

    button{
      width:100%;
      padding:12px;
      background:#2196F3;
      color:white;
      border:none;
      border-radius:5px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#1976D2;
    }

    #error{
      color:red;
      text-align:center;
      margin-bottom:10px;
    }

    .signup-link{
      text-align:center;
      margin-top:15px;
    }

    .signup-link a{
      text-decoration:none;
      color:#4CAF50;
    }

  </style>

</head>

<body>

  <div class="login-container">

    <h2>Login</h2>

    <p id="error"></p>

    <form onsubmit="login(event)">

      <input 
        type="email" 
        id="email" 
        placeholder="Enter your email"
      >

      <div class="password-box">
        <input 
          type="password" 
          id="password" 
          placeholder="Enter your password"
        >
        <span class="toggle-eye" onclick="togglePassword()">👁️</span>
      </div>

      <button type="submit">Login</button>

    </form>

    <div class="signup-link">
      Don't have an account?
      <a href="signup.html">Signup</a>
    </div>

  </div>

  <script>

    function togglePassword() {
      const password = document.getElementById("password");

      if (password.type === "password") {
        password.type = "text";
      } else {
        password.type = "password";
      }
    }

    function login(event) {

      event.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const errorText = document.getElementById("error");

      errorText.innerText = "";

      if (!email || !password) {
        errorText.innerText = "Please fill all fields";
        return;
      }
      console.log("Login function called");

      fetch("http://localhost:5000/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          email: email,
          password: password
        })
      })

      .then(res => res.json())
      .then(data => {

  console.log("Response:", data);

 if (data.success) {
  alert("Login successful");

  localStorage.setItem("user", JSON.stringify(data.user));

  setTimeout(() => {
    window.location.href = "home.html";
  }, 100);
} else {

    document.getElementById("error").innerText =
      data.message || "Login failed";

  }

})
      .catch(err => {

        console.log(err);
        errorText.innerText = "Server error";

      });

    }

  </script>

</body>
</html>
